name: Test and Lint

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check code formatting with black
      run: black --check biocomputing/ --diff
      continue-on-error: true
    
    - name: Check import sorting with isort
      run: isort --check-only biocomputing/
      continue-on-error: true
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 biocomputing/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 biocomputing/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel pytest
        pip install -e .
    
    - name: Run unit tests
      run: |
        if [ -f "biocomputing/test.py" ]; then
          python -m pytest biocomputing/test.py -v --tb=short
        else
          echo "No test.py found, skipping tests"
        fi
      continue-on-error: true
    
    - name: Verify library loading
      run: |
        python -c "from biocomputing import DNAGenerator; print('✓ Successfully imported DNAGenerator')"
        python -c "from biocomputing import generate_sequential; print('✓ Successfully imported generate_sequential')"
        python -c "from biocomputing import generate_parallel; print('✓ Successfully imported generate_parallel')"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit
    
    - name: Run security check with bandit
      run: bandit -r biocomputing/ -ll
      continue-on-error: true
